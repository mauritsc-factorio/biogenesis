;===============================================================================
; ERA 1: ITEM DESCRIPTIONS
;===============================================================================
[item-description]
; Raw foraged materials
bio-era1-wild-grass=Common grass found across open terrain. Fibrous stems can be stripped and twisted into cord.
bio-era1-wild-grain-head=Hardy stalks growing along the riverbank. Each head contains a few dozen precious kernels.
bio-era1-clover-patch=A low-growing legume with deep roots. The soil around it seems richer than elsewhere.
bio-era1-forest-nut-cluster=Hard-shelled nuts found beneath old-growth trees. Bitter and astringent when raw.
bio-era1-bracket-fungus=Shelf-like fungus growing on dead wood. Woody and tough, but the inner flesh has uses.
bio-era1-fallen-fruit=Windfall from forest trees. Bruised and fermenting slightly. Best used quickly.
bio-era1-cattail=Tall marsh plant with a distinctive brown seed head. The stalk yields fiber; the root yields starch.
bio-era1-bog-root=A starchy tuber dug from waterlogged soil. Tough to process, but filling.
bio-era1-peat-moss=Dense, waterlogged plant matter from the bog. Compresses into burnable bricks.
bio-era1-lichen-scraping=Thin, slow-growing crust scraped from rock surfaces. Contains pigments and weak nutrients.
bio-era1-rock-cress=A small, stubborn plant that grows where nothing else will. Yields little, but survives everything.

; Stone tools
bio-era1-crude-hammer=A heavy stone lashed to a stick. Adequate for cracking, pounding, and shaping.
bio-era1-knapping-blade=A carefully flaked stone edge. Cuts fiber and bark cleanly.
bio-era1-grinding-slab=A flat stone surface for milling grain and roots. Place it and work above it.
bio-era1-leaching-basket=A tightly woven fiber basket. Submerge it in running water to wash toxins from nuts.
bio-era1-digging-stick=A fire-hardened point for loosening soil. Increases root yields significantly.
bio-era1-bark-scraper=A curved stone blade designed to separate bark from wood without damaging the tree.
bio-era1-drying-rack-frame=A simple wooden frame strung with fiber cord. Hang items to dry in the air.
bio-era1-pestle=A smooth stone grip used to grind material against the Grinding Slab.

; Processed intermediates
bio-era1-plant-fiber=Long strands stripped from grass and cattail stems. The basis of all binding.
bio-era1-fiber-cord=Twisted plant fiber. Surprisingly strong. Holds tools together and racks upright.
bio-era1-rough-flour=Coarse-ground grain. Still has bits of husk. Good enough for flatbread.
bio-era1-cattail-starch=White, powdery starch extracted from cattail roots. Thickens porridge and binds cakes.
bio-era1-leached-nut-meat=Pale, mild-flavored nut meat. The bitter tannins have been washed away.
bio-era1-dried-fungus=Thin slices of bracket fungus, air-dried to leathery toughness. Stores indefinitely.
bio-era1-lichen-paste=A thick, earthy paste ground from lichen. Faintly colored. Slightly nutritious.
bio-era1-peat-brick=Compressed peat, dried and dense. Burns slowly with a smoky, acrid flame.
bio-era1-ash=Fine grey powder left after burning peat. Alkaline. You suspect it has uses you have not yet discovered.
bio-era1-root-mash=Pounded bog root mixed to a thick paste. Needs cooking to become palatable.
bio-era1-fermented-fruit-pulp=Fallen fruit left to sit. The flesh has broken down into a sharp-smelling mush. Something is happening in there.
bio-era1-clover-mulch=Shredded clover. Decomposes quickly. Enriches whatever it is mixed into.
bio-era1-bark-strip=A long strip of bark peeled from a tree. Fibrous and flexible when fresh.
bio-era1-tannin-extract=Bitter brown liquid wrung from bark and nut husks. It stains everything it touches.
bio-era1-chaff=Dry husks and broken stems left over from grain processing. Composting material.
bio-era1-cattail-root=The starchy rhizome of the cattail plant. Needs grinding to release the starch within.
bio-era1-cracked-nut=A forest nut with its shell broken open. The meat inside is still dangerously bitter.
bio-era1-shell-fragment=Hard nut shell pieces. Brittle and sharp. Useful as brown waste for composting.
bio-era1-raw-fungus=Fresh bracket fungus flesh. Wet and spongy. Must be dried before it is useful.

; Food
bio-era1-flatbread=A thin, dense bread cooked on hot stone. Simple, filling, keeps for days.
bio-era1-nut-cake=Pressed and dried nut meat. Rich and calorie-dense. A forest staple.
bio-era1-root-porridge=Thick, warm porridge made from mashed roots. Bland but sustaining.
bio-era1-fungus-broth=A thin broth simmered from dried fungus. Earthy and savory. Warms from the inside.
bio-era1-trail-mix=A mixture of nuts, dried fungus, and rough flour. Portable energy for long foraging trips.

; Composting chain
bio-era1-green-waste=Fresh plant matter rich in nitrogen. One half of the composting equation.
bio-era1-brown-waste=Dry, carbon-rich material. Bark, shells, dried leaves. The other half.
bio-era1-immature-compost=Dark, chunky, still warm. The decomposition process is underway but incomplete.
bio-era1-finished-compost=Dark, crumbly, warm to the touch. Countless tiny organisms did this work.

; Seeds
bio-era1-wild-grass-seed=Tiny seeds shaken loose from grass stems. Each one holds a complete plant.
bio-era1-wild-grain-seed=A plump grain kernel selected for its size. Something about this one seems promising.
bio-era1-cattail-seed=Fluffy seeds found inside the cattail head. They drift on the wind when released.
bio-era1-bog-root-tuber-eye=A small knob cut from a bog root tuber. It has a growing point. It could sprout.
bio-era1-forest-nut-seed=An intact nut with its embryo still viable. Given soil and time, it would become a tree.

; Breadcrumbs / anomalies
bio-era1-bioluminescent-fungus=It pulses faintly. You have no framework to understand why.
bio-era1-ancient-seed-pod=Impossibly old. The outer shell resists every tool you have.
bio-era1-anomalous-grass=This one is different. Bigger. Healthier. You wonder why.
bio-era1-unusual-clover=Four leaves instead of three. A mutation? Or something more?

; Science
bio-era1-observational-analysis-kit=A bundle of dried samples, pressed fibers, and soil specimens. Organized observations of the natural world.

; Machine items
bio-era1-stone-fire-pit=A ring of stones lined with clay. Hot enough to bake bread and boil broth.
bio-era1-compost-heap=A layered pile of green and brown waste. Time and moisture do the rest.
bio-era1-water-wheel=A wooden wheel turned by river current. The first machine that runs without you.
bio-era1-collection-basket=A sturdy woven basket. Holds the output of automated processes.

