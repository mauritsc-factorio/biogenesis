[recipe-description]
bio-era1-process-wild-grass=Strip grass stems into usable plant fiber.
bio-era1-process-cattail=Separate the starchy root from the cattail plant.
bio-era1-fiber-cord=Twist two fiber strands into a strong cord. The basis of all construction.
bio-era1-bark-strip=Carefully peel bark from wood using a scraper.
bio-era1-grind-grain=Crush wild grain heads on the Grinding Slab to separate flour from chaff.
bio-era1-bake-flatbread=Mix rough flour with water and cook on hot stone.
bio-era1-cattail-starch=Wash and grind cattail roots to extract pure starch.
bio-era1-root-mash=Pound bog root with water into a thick paste.
bio-era1-root-porridge=Cook root mash into warm, filling porridge.
bio-era1-starch-porridge=Cook cattail starch into porridge. A wetland staple.
bio-era1-crack-nuts=Smash open forest nut shells with a crude hammer.
bio-era1-leach-nuts=Soak cracked nuts in running water to wash away bitter tannins. Takes time.
bio-era1-nut-cake=Press leached nut meat into dense, calorie-rich cakes.
bio-era1-scrape-fungus=Use a bark scraper to harvest the inner flesh of bracket fungus.
bio-era1-dry-fungus=Hang raw fungus on the drying rack. Patience yields preservation.
bio-era1-fungus-broth=Simmer dried fungus in water over the fire pit. Earthy and warming.
bio-era1-compost-load=Layer green and brown waste in the heap. Decomposition begins.
bio-era1-compost-mature=Wait for immature compost to fully decompose. Life does the work.
bio-era1-waste-chaff=Sort chaff into the green waste pile.
bio-era1-clover-mulch=Shred clover into mulch for composting.
bio-era1-waste-clover-mulch=Sort clover mulch into the green waste pile.
bio-era1-waste-shell=Sort shell fragments into the brown waste pile.
bio-era1-waste-bark=Sort bark strips into the brown waste pile.
bio-era1-waste-peat=Sort peat moss into the brown waste pile.
bio-era1-waste-grass=Sort excess grass into the green waste pile.
bio-era1-peat-brick=Compress wet peat moss into a dense, burnable brick.
bio-era1-trail-mix=Combine dried food into a portable, shelf-stable mixture.
bio-era1-lichen-paste=Grind lichen scrapings into a thick paste on the Grinding Slab.
bio-era1-fermented-fruit=Leave fallen fruit to break down. Something is working on it from the inside.
bio-era1-crude-hammer=Lash a heavy stone to a sturdy stick. Your first real tool.
bio-era1-knapping-blade=Strike a stone at the right angle to produce a sharp cutting edge.
bio-era1-grinding-slab-recipe=Select and position flat stones into a grinding surface.
bio-era1-leaching-basket-recipe=Weave plant fiber into a watertight basket for nut processing.
bio-era1-digging-stick=Sharpen a stick and harden the point in embers.
bio-era1-bark-scraper=Shape a curved stone for peeling bark.
bio-era1-drying-rack-recipe=Lash sticks together with cord to build a frame for air-drying.
bio-era1-pestle=Carve a smooth stone grip for working against the Grinding Slab.
bio-era1-stone-fire-pit-recipe=Arrange stones in a ring, line with clay, fill with fuel.
bio-era1-water-wheel-recipe=Build a wheel of wood and cord that turns in the river current.
bio-era1-compost-heap-recipe=Construct a contained area for layered composting.
bio-era1-collection-basket-recipe=Weave a basket for catching output from automated processes.
bio-era1-extract-grass-seed=Carefully shake and sort grass stems to find viable seeds.
bio-era1-extract-grain-seed=Inspect grain heads closely. Some kernels are larger, more viable.
bio-era1-extract-cattail-seed=Pull apart the cattail head to find the fluffy seeds within.
bio-era1-extract-bog-root-tuber=Cut the growing eyes from bog root tubers. Each one could sprout.
bio-era1-extract-nut-seed=Search through nut clusters for intact, viable seeds.
bio-era1-observational-analysis-kit=Gather samples from four different processing chains into a systematic observation bundle.

