[technology-description]
bio-era1-foragers-eye=The land is full of growing things. Learn to see them.
bio-era1-material-properties=Stone can be shaped. Wood can be split. Understanding the nature of materials opens new possibilities.
bio-era1-fiber-arts=Twisted fiber becomes cord. Cord becomes the binding that holds civilization together.
bio-era1-thermal-processing=Fire transforms what is raw into what is nourishing. The chemistry of heat.
bio-era1-decomposition-basics=Waste is not an endpoint. Under the right conditions, it becomes the foundation of new growth.
bio-era1-hydraulic-observation=Moving water carries force. Harness it, and the first machine runs without you.
bio-era1-seeds-of-potential=Inside every plant is the blueprint for another. Learn to find and recognize seeds.
bio-era1-variation-awareness=Not all specimens are equal. Some are larger, healthier, more productive. Begin to ask why.
bio-era1-cultivation-hypothesis=You have gathered seeds. You have enriched soil. You have observed variation. A hypothesis forms: what if you chose which plants grow?
