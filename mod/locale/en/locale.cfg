bio-era1-grinding-slab=A flat stone surface for milling grain and grinding roots. Requires manual operation or Water Wheel power.
bio-era1-drying-rack=A frame of sticks and cord. Items hung here dry slowly in the open air.
bio-era1-leaching-basket=A woven basket placed near water. Submerged nuts release their bitter tannins over time.
bio-era1-stone-fire-pit=A stone-lined hearth fueled by peat bricks. Cooks food and produces ash as a byproduct.
bio-era1-compost-heap=Layer green and brown waste, keep it moist, and wait. Life you cannot see does the rest.
bio-era1-water-wheel=A wheel of wood and cord, turned by the river. Connects to a Grinding Slab for automated milling.
bio-era1-collection-basket=A simple storage basket for collected and processed materials.

