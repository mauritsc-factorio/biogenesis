[technology-description]
bio-era1-saltwater-collection=[font=default-semibold]Harvest 3 mature plants to unlock.[/font]\nThe ocean holds dissolved minerals that biology can extract.
bio-era1-solar-evaporation=[font=default-semibold]Collect 5 Saltwater to unlock.[/font]\nSolar heat separates what's dissolved — salt, minerals, potential.
bio-era1-kelp-cultivation=[font=default-semibold]Craft 3 Kelp Stalk (split 3 kelp) to unlock.[/font]\nKelp yields more than wood. Drying preserves it. Fire transforms it.
bio-era1-biomass-compression=[font=default-semibold]Place 2 landfill tiles to unlock.[/font]\nAny biomass becomes ground to stand on.
bio-era1-calcium-precipitation=[font=default-semibold]Collect 5 Sea Salt to unlock.[/font]\nSeawater holds more than salt — calcium, magnesium, trace metals. Biology can extract them all.
bio-era1-halophyte-cultivation=Learn to find and propagate seeds. Unlock new crop varieties.
bio-era1-tidal-energy=Harness tidal currents for constant electrical power.
bio-era1-seaweed-desalination=Biological desalination produces pure freshwater and concentrated minerals.
bio-era1-coastal-ecology-hypothesis=You have observed, collected, processed, and cultivated. A hypothesis forms: what if you controlled the conditions?
