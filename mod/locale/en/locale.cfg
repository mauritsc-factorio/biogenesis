;===============================================================================
; ERA 1: ITEM DESCRIPTIONS (with origin tooltips)
;===============================================================================
[item-description]
; Seeds
bio-era1-saltmarsh-grass-seed=Places a Saltmarsh Grass plant. Halophyte thriving in salt-soaked soil. Origin: adapted from coastal marsh grass.
bio-era1-glasswort-seed=Places a Glasswort plant. Edible halophyte eaten worldwide. Origin: salt-tolerant succulent from tidal flats.
bio-era1-kelp-spore-culture=Places a Kelp plant at water's edge. The keystone organism. Origin: marine macroalga, grown from spore.
bio-era1-sea-grain-seed=Places a Sea-Grain plant. Domesticated from glasswort. Origin: salt-adapted grain derived from halophyte crossing.

; Raw harvested
bio-era1-saltmarsh-grass=Tough grass from salt-soaked soil. Strips into plant fiber. Origin: harvested from halophyte crop.
bio-era1-glasswort=Fleshy, salt-tolerant succulent. Food ingredient and source of alkali ash. Origin: harvested from halophyte crop.
bio-era1-kelp=Marine macroalga. Splits into frond (food/fuel) and stalk (wood equivalent). Origin: harvested from kelp crop.
bio-era1-kelp-frond=The leafy blade of a kelp plant. Dries into fuel, roasts into food. Origin: kelp, split by hand.
bio-era1-kelp-stalk=The woody stem of a kelp plant. Structural material for machines, tools, and buildings. Origin: kelp, split by hand.
bio-era1-sea-grain=Salt-tolerant grain kernels. Grinds into flour. Origin: harvested from sea-grain crop, descended from glasswort.

; Saltwater chain
bio-era1-saltwater=Seawater collected from the ocean. Contains dissolved salt, calcium, and trace minerals. Origin: the ocean.
bio-era1-sea-salt=Crystallized salt from evaporated seawater. Origin: saltwater, solar evaporated.
bio-era1-brackish-water=Partially desalinated water. Preferred by bacteria. Origin: saltwater processing byproduct.
bio-era1-freshwater=Pure water, free of salt. Essential for cooking and advanced cultivation. Origin: saltwater, biologically desalinated.
bio-era1-concentrated-brine=Dense mineral solution. Efficient source of calcium. Origin: desalination byproduct, enriched in minerals.

; Intermediates
bio-era1-plant-fiber=Long strands stripped from grass stems. Universal binding base. Origin: saltmarsh grass, stripped by hand.
bio-era1-fiber-cord=Twisted plant fiber. Structural binding in every machine recipe. Origin: plant fiber, twisted by hand.
bio-era1-calcium-precipitate=Mineral extracted from seawater. Science pack ingredient. Origin: saltwater, chemically precipitated.
bio-era1-calcite=Calcium heated to stone hardness. Stone equivalent for tools and construction. Origin: calcium precipitate, calcined in fire pit.
bio-era1-dried-kelp=Air-dried kelp frond. Fuel (2 MJ) and science pack ingredient. Origin: kelp frond, dried on rack.
bio-era1-kelp-charcoal=Charred dried kelp. Better fuel (4 MJ). Origin: dried kelp, charred in fire pit.
bio-era1-glasswort-ash=Alkali ash from burned glasswort. Breadcrumb: soda ash for glass in Era 2. Origin: glasswort, burned in fire pit.
bio-era1-rough-flour=Coarse-ground grain with bits of husk. Food intermediate. Origin: sea-grain, ground on slab.
bio-era1-chaff=Dry husks from grain processing. Compost input. Origin: sea-grain grinding byproduct.
bio-era1-ash=Fine powder from drying and firing processes. Mineral supplement for compost. Origin: kelp processing byproduct.

; Tools
bio-era1-crude-hammer=A heavy calcite stone lashed to a kelp stalk. Construction tool. Origin: calcite from seawater + kelp stalk.
bio-era1-knapping-blade=A carefully flaked calcite edge. Cuts fiber cleanly. Origin: calcite from seawater + kelp stalk.
bio-era1-digging-stick=A sharpened kelp stalk for loosening soil. Origin: kelp stalk, hardened.
bio-era1-pestle=A smooth calcite grip for grinding against the slab. Origin: calcite + kelp stalk + fiber cord.

; Food
bio-era1-roasted-kelp=Kelp frond cooked over fire. First cooked food. Origin: kelp frond, roasted in fire pit.
bio-era1-flatbread=Thin dense bread from flour and freshwater. Origin: sea-grain flour + freshwater, baked in fire pit.
bio-era1-grain-porridge=Warm porridge from ground grain. Origin: sea-grain flour + freshwater, cooked in fire pit.

; Composting
bio-era1-green-waste=Fresh plant matter rich in nitrogen. One half of composting. Origin: classified plant material.
bio-era1-brown-waste=Dry, carbon-rich material. The other half of composting. Origin: classified woody/dry material.
bio-era1-immature-compost=Dark, chunky, still warm. Decomposition underway but incomplete. Origin: green + brown waste, heap-composted.
bio-era1-finished-compost=Dark, crumbly, warm. Countless organisms did this work. Origin: immature compost, fully decomposed.

; Land expansion
bio-era1-woven-reed-mat=Woven grass mat that becomes walkable land when placed on water. Origin: saltmarsh grass + fiber cord.
bio-era1-compressed-biomass-block=Dense block of compressed plant matter. Places as land on water. Origin: biomass, machine-compressed.

; Machines
bio-era1-saltwater-basin=Collects saltwater from the surrounding ocean. No input required. Origin: kelp stalk + plant fiber.
bio-era1-solar-evaporation-tray=Separates salt from seawater using solar heat. Origin: kelp stalk + fiber cord.
bio-era1-drying-rack-frame=Air-dries kelp fronds into preserved fuel. Origin: kelp stalk + fiber cord + knapping blade.
bio-era1-stone-fire-pit=Fueled by dried kelp or charcoal. Cooks food, calcines minerals, makes charcoal. Not on the electric grid. Origin: kelp stalk + fiber cord.
bio-era1-biomass-compressor=Compresses any biomass into dense blocks for land expansion. Origin: kelp stalk + fiber cord + crude hammer.
bio-era1-calcium-precipitation-vat=Extracts calcium precipitate from saltwater or brine. Origin: kelp stalk + fiber cord.
bio-era1-grinding-slab=Grinds sea-grain into flour. Half speed. Origin: calcite blocks from seawater.
bio-era1-seaweed-desalination-bed=Biologically desalinates saltwater into freshwater + concentrated brine. Origin: kelp stalk + plant fiber + calcite.
bio-era1-compost-heap=Converts green and brown waste into finished compost over time. Origin: kelp stalk + plant fiber.
bio-era1-tidal-power-generator=Produces 15 kW of constant electricity from tidal currents. Origin: kelp stalk + fiber cord + calcite.
bio-era1-field-notebook-station=Research station. Consumes Tidal Observation Kits to advance knowledge. Origin: kelp stalk + fiber cord.
bio-era1-crop-plot=A prepared growing bed. Insert a seed, wait 60 seconds, collect harvest + seed. Automatable with belts. Origin: kelp stalk + plant fiber.

; Logistics
bio-era1-kelp-stalk-belt=Transport belt at half vanilla speed. Moves items between machines. Origin: kelp stalk + plant fiber.
bio-era1-kelp-stalk-inserter=Inserter at half vanilla speed. Loads and unloads machines. Origin: kelp stalk + fiber cord.
bio-era1-kelp-stalk-pole=Electric pole for distributing power. Origin: kelp stalk + fiber cord.

; Bio Web
bio-era1-drift-spore=A tiny organism living between grass and kelp roots. Composting accelerator and archive specimen. Origin: Bio Web symbiosis between grass and kelp.

; Science
bio-era1-tidal-observation-kit=Systematic observations from four processing chains. Consumed by Field Notebook Station for research. Origin: dried kelp + plant fiber + sea salt + calcium precipitate.

